<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="icon" type="image/png" sizes="32x32" href="assets/icon.jpeg"> -->
    <title>Make a Face Smile | Restoring Hope & Dignity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <section id="volunteer-registration" class="section">
        <div class="container">
            <div class="volunteer-form-card">
                <h2>Join Our Team</h2>
                <p class="center-text">Your skills are a gift. Use them to restore hope.</p>

                <form action="register.php" method="POST" class="grid-form">
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" name="full-name" placeholder="e.g. Mukisa Johnson">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="e.g. jane@example.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="e.g. +256756789020">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" placeholder="e.g. Kampala, Uganda">
                    </div>

                    <div class="form-group full-width">
                        <label for="">Primary Skillset / Area of Interest</label>
                        <div class="skill-chips">
                            <label class="chip"><input type="checkbox" name="skills[]" value="outreach">Field
                                Outreach</label>
                            <label class="chip"><input type="checkbox" name="skills" value="mentoring">Social
                                Media</label>
                            <label class="chip"><input type="checkbox" name="skills[]" value="teaching">Admin &
                                Support</label>
                            <label class="chip"><input type="checkbox" name="skills[]"
                                    value="fundraising">Transportation</label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="message">Why do you want to volunteer with Make A Face Smile?</label>
                        <textarea id="message" name="message" rows="4"
                            placeholder="Tell us a bit about your heart for the mission..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary full-width">Submit Application</button>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
